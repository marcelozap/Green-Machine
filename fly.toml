# Fly.io — https://fly.io/docs/
# Replace `app` with a unique name (e.g. green-machine-yourname). Volume region must match `primary_region`.

app = "green-machine"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/health"
  protocol = "http"

[[vm]]
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"

[mounts]
  source = "greenmachine_data"
  destination = "/app/data"
